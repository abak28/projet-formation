<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dashboard test Anis</title>
  <style>
    :root {
      --bg: #120b1f;
      --bg-soft: #1a1230;
      --card: rgba(35, 20, 64, 0.75);
      --card-border: rgba(178, 121, 255, 0.28);
      --text: #efe9ff;
      --text-muted: #b9a9d8;
      --accent: #a855f7;
      --accent-2: #7c3aed;
      --shadow: 0 12px 40px rgba(83, 31, 145, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(168, 85, 247, 0.22), transparent 30%),
        radial-gradient(circle at 90% 82%, rgba(124, 58, 237, 0.2), transparent 28%),
        linear-gradient(165deg, var(--bg) 0%, #18102d 45%, #120b22 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .dashboard {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(150deg, rgba(18, 11, 34, 0.95), rgba(9, 6, 17, 0.9));
      border: 1px solid rgba(168, 85, 247, 0.22);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: clamp(1rem, 3vw, 2rem);
    }

    .header {
      margin-bottom: 1.3rem;
    }

    .title {
      font-size: clamp(1.35rem, 4.5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: clamp(0.9rem, 2.8vw, 1rem);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.9rem;
    }

    .card {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.85rem;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(140deg, var(--card), rgba(26, 14, 50, 0.76));
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1rem;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      min-height: 84px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(168, 85, 247, 0.14), transparent 40%, rgba(124, 58, 237, 0.13));
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(201, 160, 255, 0.55);
      box-shadow: 0 8px 22px rgba(124, 58, 237, 0.35);
      outline: none;
    }

    .card:hover::before,
    .card:focus-visible::before {
      opacity: 1;
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      min-width: 0;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: 0.3px;
      background: linear-gradient(145deg, var(--accent), var(--accent-2));
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.35);
    }

    .label-wrap {
      min-width: 0;
    }

    .label {
      font-size: 1rem;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .url {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 26ch;
    }

    .arrow {
      color: #dbc6ff;
      font-size: 1.15rem;
      flex-shrink: 0;
      transform: translateX(0);
      transition: transform 0.18s ease;
    }

    .card:hover .arrow,
    .card:focus-visible .arrow {
      transform: translateX(3px);
    }

    @media (min-width: 620px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 980px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .dashboard {
        padding: 2rem;
      }
    }
  </style>
</head>
<body>
  <main class="dashboard" aria-label="Dashboard de liens personnels">
    <header class="header">
      <h1 class="title">dashboard test Anis</h1>
      <p class="subtitle">Acces rapide a tes liens essentiels</p>
    </header>

    <section class="grid">
      <a class="card" href="https://www.google.com" target="_blank" rel="noopener noreferrer" aria-label="Ouvrir Google">
        <div class="card-left">
          <span class="icon">G</span>
          <div class="label-wrap">
            <div class="label">Google</div>
            <div class="url">google.com</div>
          </div>
        </div>
        <span class="arrow">-></span>
      </a>

      <a class="card" href="https://mail.google.com" target="_blank" rel="noopener noreferrer" aria-label="Ouvrir Gmail">
        <div class="card-left">
          <span class="icon">M</span>
          <div class="label-wrap">
            <div class="label">Gmail</div>
            <div class="url">mail.google.com</div>
          </div>
        </div>
        <span class="arrow">-></span>
      </a>

      <a class="card" href="https://chatgpt.com" target="_blank" rel="noopener noreferrer" aria-label="Ouvrir ChatGPT">
        <div class="card-left">
          <span class="icon">C</span>
          <div class="label-wrap">
            <div class="label">ChatGPT</div>
            <div class="url">chatgpt.com</div>
          </div>
        </div>
        <span class="arrow">-></span>
      </a>

      <a class="card" href="https://claude.ai" target="_blank" rel="noopener noreferrer" aria-label="Ouvrir Claude">
        <div class="card-left">
          <span class="icon">A</span>
          <div class="label-wrap">
            <div class="label">Claude</div>
            <div class="url">claude.ai</div>
          </div>
        </div>
        <span class="arrow">-></span>
      </a>

      <a class="card" href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="Ouvrir LinkedIn">
        <div class="card-left">
          <span class="icon">in</span>
          <div class="label-wrap">
            <div class="label">LinkedIn</div>
            <div class="url">linkedin.com</div>
          </div>
        </div>
        <span class="arrow">-></span>
      </a>

      <a class="card" href="https://www.notion.so" target="_blank" rel="noopener noreferrer" aria-label="Ouvrir Notion">
        <div class="card-left">
          <span class="icon">N</span>
          <div class="label-wrap">
            <div class="label">Notion</div>
            <div class="url">notion.so</div>
          </div>
        </div>
        <span class="arrow">-></span>
      </a>
    </section>
  </main>
</body>
</html>
